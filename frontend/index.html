        // 初始化终端
        function initTerminal() {
            try {
                console.log('Initializing terminal...');
                term = new Terminal({
                    fontSize: 14,
                    theme: {
                        // Ubuntu终端风格的颜色方案
                        background: '#282a36',
                        foreground: '#f8f8f2',
                        cursor: '#f8f8f0',
                        selection: 'rgba(255, 255, 255, 0.3)',
                        black: '#21222c',
                        red: '#ff5555',
                        green: '#50fa7b',
                        yellow: '#f1fa8c',
                        blue: '#bd93f9',
                        magenta: '#ff79c6',
                        cyan: '#8be9fd',
                        white: '#f8f8f2',
                        brightBlack: '#6272a4',
                        brightRed: '#ff6e6e',
                        brightGreen: '#69ff94',
                        brightYellow: '#ffffa5',
                        brightBlue: '#d6acff',
                        brightMagenta: '#ff92df',
                        brightCyan: '#a4ffff',
                        brightWhite: '#ffffff'
                    },
                    // 启用unicode支持
                    allowProposedApi: true,
                    // 启用ANSI颜色
                    convertEol: true,
                    // 启用制表符支持
                    tabStopWidth: 8
                });
                console.log('Terminal created:', term);

                // 适配终端大小
                fitAddon = new FitAddon.FitAddon();
                console.log('FitAddon created:', fitAddon);
                term.loadAddon(fitAddon);
                console.log('FitAddon loaded');
                
                // 加载Unicode11插件，解决中文问题
                unicode11Addon = new Unicode11Addon.Unicode11Addon();
                console.log('Unicode11Addon created:', unicode11Addon);
                term.loadAddon(unicode11Addon);
                console.log('Unicode11Addon loaded');
                
                const terminalElement = document.getElementById('terminal');
                console.log('Terminal element:', terminalElement);
                term.open(terminalElement);
                console.log('Terminal opened');
                fitAddon.fit();
                console.log('Terminal fitted');

                // 显示ASCII动画
                animateASCII();

                // 处理窗口大小变化
                window.addEventListener('resize', () => {
                    fitAddon.fit();
                });
                console.log('Resize listener added');
            } catch (e) {
                console.error('Error initializing terminal:', e);
                // 在页面上显示错误信息
                const errorDiv = document.createElement('div');
                errorDiv.style.color = 'red';
                errorDiv.style.padding = '10px';
                errorDiv.innerHTML = 'Error initializing terminal: ' + e.message;
                document.body.appendChild(errorDiv);
            }
        }

        // ANSI颜色代码
        function ansiColor(color) {
            const colors = {
                reset: '\x1b[0m',
                black: '\x1b[30m',
                red: '\x1b[31m',
                green: '\x1b[32m',
                yellow: '\x1b[33m',
                blue: '\x1b[34m',
                magenta: '\x1b[35m',
                cyan: '\x1b[36m',
                white: '\x1b[37m',
                brightBlack: '\x1b[90m',
                brightRed: '\x1b[91m',
                brightGreen: '\x1b[92m',
                brightYellow: '\x1b[93m',
                brightBlue: '\x1b[94m',
                brightMagenta: '\x1b[95m',
                brightCyan: '\x1b[96m',
                brightWhite: '\x1b[97m',
                bgBlack: '\x1b[40m',
                bgRed: '\x1b[41m',
                bgGreen: '\x1b[42m',
                bgYellow: '\x1b[43m',
                bgBlue: '\x1b[44m',
                bgMagenta: '\x1b[45m',
                bgCyan: '\x1b[46m',
                bgWhite: '\x1b[47m'
            };
            return colors[color] || colors.reset;
        }

        // 创建带图标的消息
        function iconMessage(icon, message, color = 'white') {

        // 创建制表符对话框
        function createDialog(title, content) {
            const lines = content.split('\n');
            const maxWidth = Math.max(title.length, ...lines.map(line => line.length)) + 4;
            
            let dialog = `${ansiColor('cyan')}╔${'═'.repeat(maxWidth)}╗${ansiColor('reset')}\n`;
            dialog += `${ansiColor('cyan')}║${ansiColor('yellow')} ${title.padEnd(maxWidth - 2)}${ansiColor('cyan')}║${ansiColor('reset')}\n`;
            dialog += `${ansiColor('cyan')}╠${'═'.repeat(maxWidth)}╣${ansiColor('reset')}\n`;
            
            for (const line of lines) {
                dialog += `${ansiColor('cyan')}║${ansiColor('white')} ${line.padEnd(maxWidth - 2)}${ansiColor('cyan')}║${ansiColor('reset')}\n`;
            }
            
            dialog += `${ansiColor('cyan')}╚${'═'.repeat(maxWidth)}╝${ansiColor('reset')}\n`;
            return dialog;
        }

   ${icons('tree')}  ${icons('tree')}
${ansiColor('reset')}
`
            ];
            
            let frameIndex = 0;
            const interval = setInterval(() => {
                // 清除之前的动画
                term.write('\x1b[2J\x1b[H');
                // 显示当前帧
                term.write(frames[frameIndex]);
                // 显示标题
                showTitle();
                // 显示对话框（使用图标）
                const welcomeMessage = `${icons('question')} 你踏上了修仙之路，准备好面对各种挑战了吗？\n\n` +
                    `${icons('arrowUp')} ${icons('arrowDown')} 使用上下箭头键查看历史命令\n` +

                const dialog = createDialog(`${icons('dragon')} 欢迎来到凡人修真界 ${icons('phoenix')}`, welcomeMessage);
                term.write(dialog);
                // 显示小地图
                term.write(createMinimap());
                // 显示命令提示符
                term.write('> ');
                
                frameIndex = (frameIndex + 1) % frames.length;
            }, 500);
            
            // 5秒后停止动画
            setTimeout(() => {
                clearInterval(interval);
                // 清除屏幕并显示最终状态
                term.write('\x1b[2J\x1b[H');
                showTitle();
                const welcomeMessage = `${icons('question')} 你踏上了修仙之路，准备好面对各种挑战了吗？\n\n` +
                    `${icons('arrowUp')} ${icons('arrowDown')} 使用上下箭头键查看历史命令\n` +
                    `${icons('book')} 输入 help 查看可用命令\n` +
                    `${icons('star')} 祝您修仙愉快！`;
                const dialog = createDialog(`${icons('dragon')} 欢迎来到凡人修真界 ${icons('phoenix')}`, welcomeMessage);
                term.write(dialog);
                term.write(createMinimap());
                term.write('> ');
            }, 5000);
        }

        // 建立WebSocket连接
        function connectWebSocket() {
            console.log('Attempting to connect to WebSocket server...');
            try {
                // 使用相对路径连接WebSocket，避免跨域问题
                const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = `${wsProtocol}//${window.location.host}/ws`;
                console.log('WebSocket URL:', wsUrl);
                socket = new WebSocket(wsUrl);
                console.log('WebSocket created:', socket);

                socket.onopen = function() {
                    console.log('WebSocket connection opened');
                    term.write('Connected to MUD server\r\n');
                };

                socket.onmessage = function(event) {
                    console.log('Received message:', event.data);
                    // 将\n替换为\r\n以确保正确的换行和行首定位
                    const formattedMessage = event.data.replace(/\n/g, '\r\n');
                    term.write(formattedMessage + '\r\n');
                    // 解析消息，更新状态面板
                    updateStatusPanel(event.data);
                    // 显示命令提示符
                    term.write('> ');
                };

                socket.onclose = function(event) {
                    console.log('WebSocket connection closed:', event);
                    term.write('Disconnected from MUD server\r\n');
                    term.write('Attempting to reconnect...\r\n');
                    setTimeout(connectWebSocket, 3000);
                };

                socket.onerror = function(error) {
                    console.error('WebSocket error:', error);
                    term.write('WebSocket error: ' + error + '\r\n');
                };
            } catch (e) {
                console.error('Error creating WebSocket:', e);
                term.write('Error creating WebSocket: ' + e + '\r\n');
                setTimeout(connectWebSocket, 3000);
            }
        }

        // 处理命令输入
        let commandBuffer = '';

        // 游戏内设置命令
        function handleSettingsCommand(command) {
            const parts = command.split(' ');
            if (parts.length < 3) {
                term.write('用法: settings <fontsize|opacity> <value>\r\n');
                return;
            }
            
            const setting = parts[1];
            const value = parseInt(parts[2]);
            
            if (setting === 'fontsize') {
                if (value >= 10 && value <= 20) {
                    term.options.fontSize = value;
                    fitAddon.fit();
                    localStorage.setItem('fontSize', value.toString());
                    term.write(`字体大小已设置为 ${value}\r\n`);
                } else {
                    term.write('字体大小必须在 10-20 之间\r\n');
                }
            } else if (setting === 'opacity') {
                if (value >= 50 && value <= 100) {
                    document.getElementById('terminal').style.opacity = value / 100;
                    localStorage.setItem('opacity', value.toString());
                    term.write(`透明度已设置为 ${value}%\r\n`);
                } else {
                    term.write('透明度必须在 50-100 之间\r\n');
                }
            } else {
                term.write('未知设置项，可用设置: fontsize, opacity\r\n');
            }
        }

                term.write(iconMessage('dragon', '传说中的龙出现了！', 'yellow') + '\r\n');
                term.write(iconMessage('star', '恭喜获得一颗星星！', 'yellow') + '\r\n');

        function sendCommand() {
            const command = commandBuffer.trim();
            console.log('sendCommand called with command:', command);
            if (command) {
                // 将命令添加到历史记录
                if (commandHistory.length === 0 || commandHistory[commandHistory.length - 1] !== command) {
                    commandHistory.push(command);
                }
                // 重置历史索引
                historyIndex = commandHistory.length;
                
                // 检查是否是自定义命令
                if (handleCustomCommand(command)) {
                    // 自定义命令已在前端处理
                    term.write('> '); // 显示命令提示符
                } else if (socket && socket.readyState === WebSocket.OPEN) {
                    console.log('Sending command:', command);
                    term.write('\r\n'); // 换行
                    socket.send(command);
                    commandBuffer = '';
                } else if (!socket) {
                    console.error('Socket not initialized');
                    term.write('\r\nError: Socket not initialized\r\n> ');
                    commandBuffer = '';
                } else if (socket.readyState !== WebSocket.OPEN) {
                    console.error('Socket not open, readyState:', socket.readyState);
                    term.write('\r\nError: Socket not connected\r\n> ');
                    commandBuffer = '';
                }
            } else {
                // 空命令，只显示命令提示符
                term.write('> ');
            }
        }

        // 更新状态面板（由于移除了右侧面板，现在只在终端中显示状态信息）
        function updateStatusPanel(message) {
            // 简单的状态更新逻辑，实际项目中可能需要更复杂的解析
            // 由于我们已经移除了右侧的状态面板，这里不再尝试更新DOM元素
            // 状态信息会通过后端的响应直接显示在终端中
        }

        // 加载保存的设置
        function loadSettings() {
            // 从本地存储加载设置
            const savedFontSize = localStorage.getItem('fontSize');
            const savedOpacity = localStorage.getItem('opacity');
            
            if (savedFontSize) {
                term.options.fontSize = parseInt(savedFontSize);
            }
            
            if (savedOpacity) {
                document.getElementById('terminal').style.opacity = parseInt(savedOpacity) / 100;
            }
        }

        // 处理输入完成事件
        function handleInput() {
            const inputText = hiddenInput.value;
            if (inputText.length > 0) {
                commandBuffer += inputText;
                term.write(inputText);
                hiddenInput.value = ''; // 清空输入框
            }
        }

        // 初始化函数
        function init() {
            // 初始化终端
            initTerminal();
            
            // 获取隐藏输入框
            hiddenInput = document.getElementById('hiddenInput');
            
            // 连接WebSocket
            connectWebSocket();
            
            // 处理隐藏输入框的输入事件
            hiddenInput.addEventListener('compositionstart', () => {
                isComposing = true;
            });
            
            hiddenInput.addEventListener('compositionend', (e) => {
                isComposing = false;
                const inputText = e.data || hiddenInput.value;
                if (inputText.length > 0) {
                    commandBuffer += inputText;
                    term.write(inputText);
                    hiddenInput.value = '';
                }
            });
            
            hiddenInput.addEventListener('input', () => {
                if (!isComposing) {
                    const inputText = hiddenInput.value;
                    if (inputText.length > 0) {
                        commandBuffer += inputText;
                        term.write(inputText);
                        hiddenInput.value = '';
                    }
                }
            });
            
            hiddenInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    // 处理回车键
                    e.preventDefault();
                    sendCommand();
                } else if (e.key === 'Backspace') {
                    // 处理退格键
                    if (commandBuffer.length > 0) {
                        // 从命令缓冲区中删除最后一个字符
                        const lastChar = commandBuffer.charAt(commandBuffer.length - 1);
                        commandBuffer = commandBuffer.slice(0, -1);
                        
                        // 检查字符是否为中文或其他宽字符
                        // 中文Unicode范围：\u4e00-\u9fff
                        // 日文假名：\u3040-\u309f, \u30a0-\u30ff
                        // 韩文：\uac00-\ud7af
                        const isWideChar = /[\u4e00-\u9fff\u3040-\u309f\u30a0-\u30ff\uac00-\ud7af]/.test(lastChar);
                        
                        // 发送退格命令，宽字符需要发送两个退格
                        if (isWideChar) {
                            term.write('\b \b\b \b');
                        } else {
                            term.write('\b \b');
                        }
                    } else {
                        // 清空隐藏输入框
                        hiddenInput.value = '';
                    }
                } else if (e.key === 'ArrowUp') {
                    // 处理上箭头键，显示上一条命令
                    e.preventDefault();
                    if (commandHistory.length > 0) {
                        // 清除当前输入
                        for (let i = 0; i < commandBuffer.length; i++) {
                            const char = commandBuffer.charAt(i);
                            const isWideChar = /[\u4e00-\u9fff\u3040-\u309f\u30a0-\u30ff\uac00-\ud7af]/.test(char);
                            if (isWideChar) {
                                term.write('\b \b\b \b');
                            } else {
                                term.write('\b \b');
                            }
                        }
                        
                        // 移动到上一条命令
                        if (historyIndex > 0) {
                            historyIndex--;
                        }
                        
                        // 获取历史命令
                        const historyCommand = commandHistory[historyIndex];
                        if (historyCommand) {
                            commandBuffer = historyCommand;
                            term.write(historyCommand);
                        }
                    }
                } else if (e.key === 'ArrowDown') {
                    // 处理下箭头键，显示下一条命令
                    e.preventDefault();
                    if (commandHistory.length > 0) {
                        // 清除当前输入
                        for (let i = 0; i < commandBuffer.length; i++) {
                            const char = commandBuffer.charAt(i);
                            const isWideChar = /[\u4e00-\u9fff\u3040-\u309f\u30a0-\u30ff\uac00-\ud7af]/.test(char);
                            if (isWideChar) {
                                term.write('\b \b\b \b');
                            } else {
                                term.write('\b \b');
                            }
                        }
                        
                        // 移动到下一条命令
                        if (historyIndex < commandHistory.length - 1) {
                            historyIndex++;
                        } else {
                            // 到达历史记录末尾，清空输入
                            historyIndex = commandHistory.length;
                            commandBuffer = '';
                            return;
                        }
                        
                        // 获取历史命令
                        const historyCommand = commandHistory[historyIndex];
                        if (historyCommand) {
                            commandBuffer = historyCommand;
                            term.write(historyCommand);
                        }
                    }
                }
            });
            
            // 启用终端输入
            term.onKey(e => {
                // 如果正在组合输入，忽略直接的按键事件
                if (isComposing) {
                    return;
                }
                
                const char = e.key;
                
                if (e.domEvent.key === 'Enter') {
                    // 处理回车键
                    sendCommand();
                } else if (e.domEvent.key === 'Backspace') {
                    // 处理退格键
                    if (commandBuffer.length > 0) {
                        // 从命令缓冲区中删除最后一个字符
                        const lastChar = commandBuffer.charAt(commandBuffer.length - 1);
                        commandBuffer = commandBuffer.slice(0, -1);
                        
                        // 检查字符是否为中文或其他宽字符
                        const isWideChar = /[\u4e00-\u9fff\u3040-\u309f\u30a0-\u30ff\uac00-\ud7af]/.test(lastChar);
                        
                        // 发送退格命令，宽字符需要发送两个退格
                        if (isWideChar) {
                            term.write('\b \b\b \b');
                        } else {
                            term.write('\b \b');
                        }
                    }
                } else if (e.domEvent.key === 'ArrowUp') {
                    // 处理上箭头键，显示上一条命令
                    if (commandHistory.length > 0) {
                        // 清除当前输入
                        for (let i = 0; i < commandBuffer.length; i++) {
                            const char = commandBuffer.charAt(i);
                            const isWideChar = /[\u4e00-\u9fff\u3040-\u309f\u30a0-\u30ff\uac00-\ud7af]/.test(char);
                            if (isWideChar) {
                                term.write('\b \b\b \b');
                            } else {
                                term.write('\b \b');
                            }
                        }
                        
                        // 移动到上一条命令
                        if (historyIndex > 0) {
                            historyIndex--;
                        }
                        
                        // 获取历史命令
                        const historyCommand = commandHistory[historyIndex];
                        if (historyCommand) {
                            commandBuffer = historyCommand;
                            term.write(historyCommand);
                        }
                    }
                } else if (e.domEvent.key === 'ArrowDown') {
                    // 处理下箭头键，显示下一条命令
                    if (commandHistory.length > 0) {
                        // 清除当前输入
                        for (let i = 0; i < commandBuffer.length; i++) {
                            const char = commandBuffer.charAt(i);
                            const isWideChar = /[\u4e00-\u9fff\u3040-\u309f\u30a0-\u30ff\uac00-\ud7af]/.test(char);
                            if (isWideChar) {
                                term.write('\b \b\b \b');
                            } else {
                                term.write('\b \b');
                            }
                        }
                        
                        // 移动到下一条命令
                        if (historyIndex < commandHistory.length - 1) {
                            historyIndex++;
                        } else {
                            // 到达历史记录末尾，清空输入
                            historyIndex = commandHistory.length;
                            commandBuffer = '';
                            term.write('');
                            return;
                        }
                        
                        // 获取历史命令
                        const historyCommand = commandHistory[historyIndex];
                        if (historyCommand) {
                            commandBuffer = historyCommand;
                            term.write(historyCommand);
                        }
                    }
                } else if (e.domEvent.ctrlKey && e.domEvent.key === 'v') {
                    // 处理Ctrl+V粘贴操作
                    navigator.clipboard.readText()
                        .then(text => {
                            commandBuffer += text;
                            term.write(text);
                        })
                        .catch(err => {
                            console.error('无法读取剪贴板内容:', err);
                        });
                } else if (e.domEvent.ctrlKey && e.domEvent.key === 'c') {
                    // 允许默认的复制行为
                    // 不阻止默认事件，让xterm.js处理复制
                } else if (char.length === 1 && !e.domEvent.ctrlKey && !e.domEvent.metaKey) {
                    // 处理可打印字符，排除控制键
                    commandBuffer += char;
                    term.write(char);
                } else if (char.length > 1 && !e.domEvent.ctrlKey && !e.domEvent.metaKey) {
                    // 处理多字符输入（如中文），排除控制键
                    commandBuffer += char;
                    term.write(char);
                }
            });

            // 启用剪贴板操作
            term.attachCustomKeyEventHandler(e => {
                // 处理粘贴事件
                if (e.type === 'paste') {
                    e.preventDefault();
                    const clipboardData = e.clipboardData || window.clipboardData;
                    const text = clipboardData.getData('text');
                    commandBuffer += text;
                    term.write(text);
                    return false;
                }
                
                // 处理复制事件
                if (e.type === 'copy') {
                    // 不阻止默认事件，让xterm.js处理复制
                    return true;
                }
                
                // 处理IME组合事件
                if (e.type === 'compositionstart') {
                    isComposing = true;
                    hiddenInput.focus();
                } else if (e.type === 'compositionend') {
                    isComposing = false;
                }
                
                // 当点击终端时，将焦点转移到隐藏输入框
                if (e.type === 'click') {
                    // 只有在没有选择文本时才转移焦点
                    // 这样用户可以选择文本进行复制
                    if (!term.hasSelection()) {
                        hiddenInput.focus();
                    }
                }
                
                return true;
            });
            
            // 启用xterm.js的选择和复制功能
            term.options.disableStdin = false;
            
            // 当终端获得焦点时，将焦点转移到隐藏输入框
            term.element.addEventListener('click', () => {
                // 只有在没有选择文本时才转移焦点
                // 这样用户可以选择文本进行复制
                if (!term.hasSelection()) {
                    hiddenInput.focus();
                }
            });
            
            console.log('Terminal input enabled');

            // 显示命令提示符
            term.write('> ');

            // 加载设置
            loadSettings();
        }

        // 页面加载完成后初始化
        window.onload = init;
    </script>
