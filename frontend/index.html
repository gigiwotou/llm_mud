<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUD Game</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@4.18.0/css/xterm.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
        }
        #game-container {
            width: 100vw;
            height: 100vh;
        }
        #main-content {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        #terminal {
            flex: 1;
            background-color: #000000;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="main-content">
            <div id="terminal"></div>
        </div>
    </div>

    <!-- 从CDN加载xterm.js，避免本地文件路径问题 -->
    <script src="https://cdn.jsdelivr.net/npm/xterm@4.18.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.5.0/lib/xterm-addon-fit.js"></script>
    <script>
        // 全局变量
        let term;
        let fitAddon;
        let socket;

        // 初始化终端
        function initTerminal() {
            try {
                console.log('Initializing terminal...');
                term = new Terminal({
                    fontSize: 14,
                    theme: {
                        background: '#000000',
                        foreground: '#ffffff'
                    }
                });
                console.log('Terminal created:', term);

                // 适配终端大小
                fitAddon = new FitAddon.FitAddon();
                console.log('FitAddon created:', fitAddon);
                term.loadAddon(fitAddon);
                console.log('FitAddon loaded');
                
                const terminalElement = document.getElementById('terminal');
                console.log('Terminal element:', terminalElement);
                term.open(terminalElement);
                console.log('Terminal opened');
                fitAddon.fit();
                console.log('Terminal fitted');

                // 显示ASCII标题
                showTitle();

                // 处理窗口大小变化
                window.addEventListener('resize', () => {
                    fitAddon.fit();
                });
                console.log('Resize listener added');
            } catch (e) {
                console.error('Error initializing terminal:', e);
                // 在页面上显示错误信息
                const errorDiv = document.createElement('div');
                errorDiv.style.color = 'red';
                errorDiv.style.padding = '10px';
                errorDiv.innerHTML = 'Error initializing terminal: ' + e.message;
                document.body.appendChild(errorDiv);
            }
        }

        // 显示ASCII标题
        function showTitle() {
            const title = `
╔══════════════════════════════════════════════════════════════════════╗
║                                                                  ║
║   ▄▄▄▄▄▄▄▄▄▄▄  ▄▄▄▄▄▄▄▄▄▄▄  ▄▄▄▄▄▄▄▄▄▄▄  ▄▄▄▄▄▄▄▄▄▄▄          ║
║  ▐░░░░░░░░░░░▌▐░░░░░░░░░░░▌▐░░░░░░░░░░░▌▐░░░░░░░░░░░▌         ║
║  ▐░█▀▀▀▀▀▀▀▀▀ ▐░█▀▀▀▀▀▀▀▀▀ ▐░█▀▀▀▀▀▀▀▀▀ ▐░█▀▀▀▀▀▀▀▀▀          ║
║  ▐░▌          ▐░▌          ▐░▌          ▐░▌                     ║
║  ▐░█▄▄▄▄▄▄▄▄▄ ▐░█▄▄▄▄▄▄▄▄▄ ▐░█▄▄▄▄▄▄▄▄▄ ▐░█▄▄▄▄▄▄▄▄▄          ║
║  ▐░░░░░░░░░░░▌▐░░░░░░░░░░░▌▐░░░░░░░░░░░▌▐░░░░░░░░░░░▌         ║
║  ▐░█▀▀▀▀▀▀▀▀▀ ▐░█▀▀▀▀▀▀▀▀▀ ▐░█▀▀▀▀▀▀▀▀▀ ▐░█▀▀▀▀▀▀▀▀▀          ║
║  ▐░▌          ▐░▌          ▐░▌          ▐░▌                     ║
║  ▐░█▄▄▄▄▄▄▄▄▄ ▐░█▄▄▄▄▄▄▄▄▄ ▐░█▄▄▄▄▄▄▄▄▄ ▐░█▄▄▄▄▄▄▄▄▄          ║
║  ▐░░░░░░░░░░░▌▐░░░░░░░░░░░▌▐░░░░░░░░░░░▌▐░░░░░░░░░░░▌         ║
║   ▀▀▀▀▀▀▀▀▀▀▀  ▀▀▀▀▀▀▀▀▀▀▀  ▀▀▀▀▀▀▀▀▀▀▀  ▀▀▀▀▀▀▀▀▀▀▀          ║
║                                                                  ║
║                    《凡人修真界》                                 ║
║                                                                  ║
╚══════════════════════════════════════════════════════════════════════╝
`;
            term.write(title);
        }

        // 建立WebSocket连接
        function connectWebSocket() {
            console.log('Attempting to connect to WebSocket server...');
            try {
                // 使用相对路径连接WebSocket，避免跨域问题
                const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = `${wsProtocol}//${window.location.host}/ws`;
                console.log('WebSocket URL:', wsUrl);
                socket = new WebSocket(wsUrl);
                console.log('WebSocket created:', socket);

                socket.onopen = function() {
                    console.log('WebSocket connection opened');
                    term.write('Connected to MUD server\r\n');
                };

                socket.onmessage = function(event) {
                    console.log('Received message:', event.data);
                    // 将\n替换为\r\n以确保正确的换行和行首定位
                    const formattedMessage = event.data.replace(/\n/g, '\r\n');
                    term.write(formattedMessage + '\r\n');
                    // 解析消息，更新状态面板
                    updateStatusPanel(event.data);
                    // 显示命令提示符
                    term.write('> ');
                };

                socket.onclose = function(event) {
                    console.log('WebSocket connection closed:', event);
                    term.write('Disconnected from MUD server\r\n');
                    term.write('Attempting to reconnect...\r\n');
                    setTimeout(connectWebSocket, 3000);
                };

                socket.onerror = function(error) {
                    console.error('WebSocket error:', error);
                    term.write('WebSocket error: ' + error + '\r\n');
                };
            } catch (e) {
                console.error('Error creating WebSocket:', e);
                term.write('Error creating WebSocket: ' + e + '\r\n');
                setTimeout(connectWebSocket, 3000);
            }
        }

        // 处理命令输入
        let commandBuffer = '';

        // 游戏内设置命令
        function handleSettingsCommand(command) {
            const parts = command.split(' ');
            if (parts.length < 3) {
                term.write('用法: settings <fontsize|opacity> <value>\r\n');
                return;
            }
            
            const setting = parts[1];
            const value = parseInt(parts[2]);
            
            if (setting === 'fontsize') {
                if (value >= 10 && value <= 20) {
                    term.options.fontSize = value;
                    fitAddon.fit();
                    localStorage.setItem('fontSize', value.toString());
                    term.write(`字体大小已设置为 ${value}\r\n`);
                } else {
                    term.write('字体大小必须在 10-20 之间\r\n');
                }
            } else if (setting === 'opacity') {
                if (value >= 50 && value <= 100) {
                    document.getElementById('terminal').style.opacity = value / 100;
                    localStorage.setItem('opacity', value.toString());
                    term.write(`透明度已设置为 ${value}%\r\n`);
                } else {
                    term.write('透明度必须在 50-100 之间\r\n');
                }
            } else {
                term.write('未知设置项，可用设置: fontsize, opacity\r\n');
            }
        }

        // 扩展命令处理
        function handleCustomCommand(command) {
            if (command.startsWith('settings')) {
                handleSettingsCommand(command);
                return true;
            }
            return false;
        }

        function sendCommand() {
            const command = commandBuffer.trim();
            console.log('sendCommand called with command:', command);
            if (command) {
                // 检查是否是自定义命令
                if (handleCustomCommand(command)) {
                    // 自定义命令已在前端处理
                    term.write('> '); // 显示命令提示符
                } else if (socket && socket.readyState === WebSocket.OPEN) {
                    console.log('Sending command:', command);
                    term.write('\r\n'); // 换行
                    socket.send(command);
                    commandBuffer = '';
                } else if (!socket) {
                    console.error('Socket not initialized');
                    term.write('\r\nError: Socket not initialized\r\n> ');
                    commandBuffer = '';
                } else if (socket.readyState !== WebSocket.OPEN) {
                    console.error('Socket not open, readyState:', socket.readyState);
                    term.write('\r\nError: Socket not connected\r\n> ');
                    commandBuffer = '';
                }
            } else {
                // 空命令，只显示命令提示符
                term.write('> ');
            }
        }

        // 更新状态面板（由于移除了右侧面板，现在只在终端中显示状态信息）
        function updateStatusPanel(message) {
            // 简单的状态更新逻辑，实际项目中可能需要更复杂的解析
            // 由于我们已经移除了右侧的状态面板，这里不再尝试更新DOM元素
            // 状态信息会通过后端的响应直接显示在终端中
        }

        // 加载保存的设置
        function loadSettings() {
            // 从本地存储加载设置
            const savedFontSize = localStorage.getItem('fontSize');
            const savedOpacity = localStorage.getItem('opacity');
            
            if (savedFontSize) {
                term.options.fontSize = parseInt(savedFontSize);
            }
            
            if (savedOpacity) {
                document.getElementById('terminal').style.opacity = parseInt(savedOpacity) / 100;
            }
        }

        // 初始化函数
        function init() {
            // 初始化终端
            initTerminal();
            
            // 连接WebSocket
            connectWebSocket();
            
            // 启用终端输入
            term.onKey(e => {
                const char = e.key;
                
                if (e.domEvent.key === 'Enter') {
                    // 处理Enter键
                    sendCommand();
                    term.write('> '); // 显示命令提示符
                } else if (e.domEvent.key === 'Backspace') {
                    // 处理退格键
                    if (commandBuffer.length > 0) {
                        commandBuffer = commandBuffer.slice(0, -1);
                        term.write('\b \b'); // 清除最后一个字符
                    }
                } else if (char.length === 1 && !e.domEvent.ctrlKey && !e.domEvent.metaKey) {
                    // 处理可打印字符（包括中文），排除控制键
                    commandBuffer += char;
                    term.write(char);
                } else if (char.length > 1 && !e.domEvent.ctrlKey && !e.domEvent.metaKey) {
                    // 处理多字符输入（如中文），排除控制键
                    commandBuffer += char;
                    term.write(char);
                }
            });
            console.log('Terminal input enabled');

            // 显示命令提示符
            term.write('> ');

            // 加载设置
            loadSettings();
        }

        // 页面加载完成后初始化
        window.onload = init;
    </script>
</body>
</html>
