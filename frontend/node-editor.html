<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可视化节点世界编辑器</title>
    <style>
        /* CSS 变量 */
        :root {
            --bg: #0f1115;
            --bg-elevated: rgba(255, 255, 255, 0.04);
            --border-subtle: rgba(255, 255, 255, 0.06);
            --text-primary: rgba(255, 255, 255, 0.92);
            --text-secondary: rgba(255, 255, 255, 0.55);
            --text-muted: rgba(255, 255, 255, 0.35);
            --accent: #38bdf8;
            --accent-soft: rgba(56, 189, 248, 0.15);
            --danger: #ef4444;
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 10px;
            --transition-fast: 0.15s ease-out;
            --transition-normal: 0.25s ease-out;
        }
        
        /* 全局样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }
        
        /* 应用容器 */
        .app-container {
            display: flex;
            height: 100vh;
        }
        
        /* 侧边栏 */
        .sidebar {
            width: 300px;
            background: var(--bg);
            border-right: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
        }
        
        /* 侧边栏头部 */
        .sidebar-header {
            padding: 28px 24px 20px;
            border-bottom: 1px solid var(--border-subtle);
        }
        
        .sidebar-header h1 {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.01em;
            margin-bottom: 4px;
        }
        
        .sidebar-header p {
            font-size: 0.8rem;
            color: var(--text-muted);
            line-height: 1.5;
        }
        
        /* 侧边栏内容 */
        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
        }
        
        /* 区块样式 */
        .section {
            margin-bottom: 28px;
        }
        
        .section-title {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-bottom: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }
        
        /* 按钮样式 */
        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: inherit;
            width: 100%;
        }
        
        .btn-primary {
            background: var(--text-primary);
            color: var(--bg);
        }
        
        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }
        
        .btn-secondary {
            background: var(--bg-elevated);
            color: var(--text-primary);
            border: 1px solid var(--border-subtle);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.12);
        }
        
        .btn-secondary:active {
            transform: scale(0.98);
        }
        
        .btn-danger {
            background: var(--danger);
            color: white;
        }
        
        .btn-danger:hover {
            opacity: 0.9;
        }
        
        /* 按钮组 */
        .btn-group {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        
        .btn-group .btn {
            flex: 1;
        }
        
        /* 表单样式 */
        .form-group {
            margin-bottom: 14px;
        }
        
        .form-group label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 6px;
            font-weight: 500;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 8px 10px;
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 0.85rem;
            font-family: inherit;
            transition: var(--transition-fast);
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(56, 189, 248, 0.05);
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
            line-height: 1.5;
        }
        
        /* 画布容器 */
        .canvas-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        
        #canvas {
            display: block;
            cursor: crosshair;
        }
        
        /* 工具栏 */
        .toolbar {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(15, 17, 21, 0.85);
            padding: 8px;
            border-radius: var(--radius-lg);
            display: flex;
            gap: 6px;
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-subtle);
        }
        
        .tool-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: transparent;
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.1rem;
            transition: var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .tool-btn:hover {
            background: var(--bg-elevated);
            color: var(--text-primary);
        }
        
        .tool-btn.active {
            background: var(--accent-soft);
            color: var(--accent);
        }
        
        /* 缩放控制 */
        .zoom-controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(15, 17, 21, 0.85);
            padding: 8px;
            border-radius: var(--radius-lg);
            display: flex;
            gap: 4px;
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-subtle);
        }
        
        /* 信息面板 */
        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(15, 17, 21, 0.85);
            padding: 16px 18px;
            border-radius: var(--radius-lg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-subtle);
            min-width: 180px;
        }
        
        .info-panel h3 {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-bottom: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }
        
        .info-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            margin-bottom: 6px;
            color: var(--text-secondary);
        }
        
        .info-item:last-child {
            margin-bottom: 0;
        }
        
        .info-item span:last-child {
            color: var(--text-primary);
            font-weight: 500;
            font-variant-numeric: tabular-nums;
        }
        
        /* 节点列表 */
        .node-list {
            max-height: 280px;
            overflow-y: auto;
        }
        
        .node-list-item {
            padding: 10px 12px;
            border-radius: var(--radius-md);
            margin-bottom: 6px;
            cursor: pointer;
            transition: var(--transition-fast);
            border: 1px solid transparent;
        }
        
        .node-list-item:hover {
            background: var(--bg-elevated);
        }
        
        .node-list-item.selected {
            background: var(--accent-soft);
            border-color: var(--accent);
        }
        
        .node-list-item-name {
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 2px;
            color: var(--text-primary);
        }
        
        .node-list-item.selected .node-list-item-name {
            color: var(--accent);
        }
        
        .node-list-item-id {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-variant-numeric: tabular-nums;
        }
        
        /* 颜色选择器 */
        .color-picker {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        
        .color-option {
            width: 24px;
            height: 24px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            border: 2px solid transparent;
            transition: var(--transition-fast);
        }
        
        .color-option:hover {
            transform: scale(1.05);
        }
        
        .color-option.selected {
            border-color: var(--text-primary);
            transform: scale(1.1);
            box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--text-primary);
        }
        
        /* 帮助文本 */
        .help-text {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 12px;
            line-height: 1.6;
        }
        
        .help-text strong {
            color: var(--text-secondary);
            font-weight: 600;
        }
        
        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--border-subtle);
            border-radius: 3px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.15);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>节点编辑器</h1>
                <p>构建你的游戏世界</p>
            </div>
            
            <div class="sidebar-content">
                <div class="section">
                <div class="section-title">操作</div>
                <button class="btn btn-primary" onclick="addNode()">
                    添加房间
                </button>
                <div class="btn-group">
                    <button class="btn btn-secondary" onclick="loadWorld()">
                        加载
                    </button>
                    <button class="btn btn-secondary" onclick="saveWorld()">
                        保存
                    </button>
                </div>
                <button class="btn btn-secondary" onclick="clearCanvas()" style="margin-top: 10px;">
                    清空
                </button>
                <button class="btn btn-secondary" onclick="createDemoWorld()" style="margin-top: 10px;">
                    示例世界
                </button>
            </div>
                
                <div class="section" id="propertyPanel" style="display: none;">
                    <div class="section-title">节点属性</div>
                    <div class="form-group">
                        <label>房间ID</label>
                        <input type="text" id="propId" placeholder="room_001">
                    </div>
                    <div class="form-group">
                        <label>房间名称</label>
                        <input type="text" id="propName" placeholder="村庄广场">
                    </div>
                    <div class="form-group">
                        <label>描述</label>
                        <textarea id="propDesc" placeholder="房间描述..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>等级</label>
                        <input type="number" id="propLevel" value="1" min="1">
                    </div>
                    <div class="form-group">
                        <label>环境类型</label>
                        <select id="propEnv">
                            <option value="village">村庄</option>
                            <option value="forest">森林</option>
                            <option value="mountain">山脉</option>
                            <option value="cave">洞穴</option>
                            <option value="city">城市</option>
                            <option value="temple">寺庙</option>
                            <option value="dungeon">地牢</option>
                            <option value="plains">平原</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>安全区域</label>
                        <select id="propSafe">
                            <option value="true">是</option>
                            <option value="false">否</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>节点颜色</label>
                        <div class="color-picker" id="colorPicker"></div>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-primary" onclick="updateNodeProperties()">
                            应用
                        </button>
                        <button class="btn btn-danger" onclick="deleteSelectedNode()">
                            删除
                        </button>
                    </div>
                </div>
                
                <div class="section">
                    <div class="section-title">房间列表</div>
                    <div class="node-list" id="nodeList"></div>
                </div>
                
                <div class="section">
                    <div class="section-title">快捷键</div>
                    <div class="help-text">
                        <p><strong>左键拖拽</strong> 移动节点</p>
                        <p><strong>左键点击</strong> 选择节点</p>
                        <p><strong>右键点击</strong> 连接节点</p>
                        <p><strong>滚轮</strong> 缩放画布</p>
                        <p><strong>中键拖拽</strong> 平移画布</p>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="canvas-container">
            <div class="toolbar">
                <button class="tool-btn active" id="toolSelect" title="选择工具" onclick="setTool('select')">
                    👆
                </button>
                <button class="tool-btn" id="toolConnect" title="连接工具" onclick="setTool('connect')">
                    🔗
                </button>
                <button class="tool-btn" id="toolPan" title="平移工具" onclick="setTool('pan')">
                    ✋
                </button>
            </div>
            
            <div class="zoom-controls">
                <button class="tool-btn" onclick="zoomIn()">+</button>
                <button class="tool-btn" onclick="zoomOut()">−</button>
                <button class="tool-btn" onclick="resetZoom()">⟲</button>
            </div>
            
            <div class="info-panel">
                <h3>统计</h3>
                <div class="info-item">
                    <span>房间</span>
                    <span id="statNodes">0</span>
                </div>
                <div class="info-item">
                    <span>连接</span>
                    <span id="statConnections">0</span>
                </div>
                <div class="info-item">
                    <span>缩放</span>
                    <span id="statZoom">100%</span>
                </div>
            </div>
            
            <canvas id="canvas"></canvas>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let nodes = [];
        let connections = [];
        let selectedNode = null;
        let draggingNode = null;
        let dragOffset = { x: 0, y: 0 };
        let currentTool = 'select';
        let connectingFrom = null;
        let tempConnection = null;
        let hoveredDirection = null;
        let hoveredNode = null;
        
        let zoom = 1;
        let pan = { x: 0, y: 0 };
        let isPanning = false;
        let panStart = { x: 0, y: 0 };
        
        const nodeColors = [
            '#00d4ff', '#7b2cbf', '#ff6b6b', '#4ecdc4',
            '#45b7d1', '#96ceb4', '#ffeaa7', '#dfe6e9',
            '#fd79a8', '#a29bfe', '#00b894', '#e17055'
        ];
        
        const envIcons = {
            village: '🏘️',
            forest: '🌲',
            mountain: '⛰️',
            cave: '🕳️',
            city: '🏙️',
            temple: '🏛️',
            dungeon: '🏚️',
            plains: '🌾'
        };
        
        function init() {
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            setupEventListeners();
            initColorPicker();
            render();
        }
        
        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            render();
        }
        
        function initColorPicker() {
            const picker = document.getElementById('colorPicker');
            nodeColors.forEach((color, index) => {
                const option = document.createElement('div');
                option.className = 'color-option';
                option.style.backgroundColor = color;
                option.onclick = () => selectColor(index);
                picker.appendChild(option);
            });
        }
        
        function selectColor(index) {
            const options = document.querySelectorAll('.color-option');
            options.forEach((opt, i) => {
                opt.classList.toggle('selected', i === index);
            });
            if (selectedNode) {
                selectedNode.colorIndex = index;
                render();
            }
        }
        
        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('tool' + tool.charAt(0).toUpperCase() + tool.slice(1)).classList.add('active');
            canvas.style.cursor = tool === 'pan' ? 'grab' : tool === 'connect' ? 'crosshair' : 'default';
        }
        
        function setupEventListeners() {
            canvas.addEventListener('mousedown', handleMouseDown);
            canvas.addEventListener('mousemove', handleMouseMove);
            canvas.addEventListener('mouseup', handleMouseUp);
            canvas.addEventListener('contextmenu', handleContextMenu);
            canvas.addEventListener('wheel', handleWheel);
            canvas.addEventListener('mousemove', handleMouseHover);
        }
        
        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: (e.clientX - rect.left - pan.x) / zoom,
                y: (e.clientY - rect.top - pan.y) / zoom
            };
        }
        
        function getNodeAtPos(pos) {
            for (let i = nodes.length - 1; i >= 0; i--) {
                const node = nodes[i];
                const size = 80;
                const halfSize = size / 2;
                if (pos.x >= node.x - halfSize && pos.x <= node.x + halfSize &&
                    pos.y >= node.y - halfSize && pos.y <= node.y + halfSize) {
                    return node;
                }
            }
            return null;
        }
        
        function getDirectionFromPos(node, pos) {
            const size = 76;
            const halfSize = size / 2;
            const connectorRadius = 20; // 扩大一点检测区域，更容易点击
            
            // 北连接器 - 圆形检测
            const northX = node.x;
            const northY = node.y - halfSize;
            if (Math.hypot(pos.x - northX, pos.y - northY) <= connectorRadius) {
                return 'north';
            }
            
            // 东连接器 - 圆形检测
            const eastX = node.x + halfSize;
            const eastY = node.y;
            if (Math.hypot(pos.x - eastX, pos.y - eastY) <= connectorRadius) {
                return 'east';
            }
            
            // 南连接器 - 圆形检测
            const southX = node.x;
            const southY = node.y + halfSize;
            if (Math.hypot(pos.x - southX, pos.y - southY) <= connectorRadius) {
                return 'south';
            }
            
            // 西连接器 - 圆形检测
            const westX = node.x - halfSize;
            const westY = node.y;
            if (Math.hypot(pos.x - westX, pos.y - westY) <= connectorRadius) {
                return 'west';
            }
            
            return null;
        }
        
        let isDraggingConnection = false;
        
        function handleMouseDown(e) {
            const pos = getMousePos(e);
            
            if (e.button === 1) {
                isPanning = true;
                panStart = { x: e.clientX - pan.x, y: e.clientY - pan.y };
                canvas.style.cursor = 'grabbing';
                return;
            }
            
            if (e.button === 0) {
                e.preventDefault();
                
                // 首先检查所有节点的连接点
                for (const node of nodes) {
                    const direction = getDirectionFromPos(node, pos);
                    if (direction) {
                        console.log('Mouse down at:', pos.x, pos.y, 'Node:', node.id, 'Direction:', direction);
                        // 点击了方向连接器，开始连接
                        connectingFrom = node;
                        tempConnection = { from: node, to: pos, fromDirection: direction };
                        isDraggingConnection = true;
                        setTool('connect');
                        canvas.style.cursor = 'crosshair';
                        selectNode(node);
                        console.log('Started connection from:', node.id, 'direction:', direction);
                        return;
                    }
                }
                
                // 然后检查节点中心
                const node = getNodeAtPos(pos);
                if (node) {
                    console.log('Mouse down at:', pos.x, pos.y, 'Node:', node.id);
                    // 点击了节点中心
                    selectNode(node);
                    draggingNode = node;
                    dragOffset = {
                        x: pos.x - node.x,
                        y: pos.y - node.y
                    };
                    canvas.style.cursor = 'grabbing';
                    console.log('Started dragging node:', node.id);
                } else {
                    // 点击了空白处
                    selectNode(null);
                    connectingFrom = null;
                    tempConnection = null;
                    isDraggingConnection = false;
                    canvas.style.cursor = 'default';
                    console.log('Clicked on empty space');
                }
            }
        }
        
        function handleMouseMove(e) {
            e.preventDefault();
            const pos = getMousePos(e);
            
            if (isPanning) {
                pan.x = e.clientX - panStart.x;
                pan.y = e.clientY - panStart.y;
                render();
                return;
            }
            
            if (draggingNode) {
                draggingNode.x = pos.x - dragOffset.x;
                draggingNode.y = pos.y - dragOffset.y;
                render();
                return;
            }
            
            if (isDraggingConnection && tempConnection) {
                tempConnection.to = pos;
                render();
                console.log('Dragging connection to:', pos.x, pos.y);
            }
        }
        
        function handleMouseUp(e) {
            e.preventDefault();
            
            if (isPanning) {
                isPanning = false;
                canvas.style.cursor = currentTool === 'pan' ? 'grab' : 'default';
                return;
            }
            
            if (draggingNode) {
                draggingNode = null;
                canvas.style.cursor = 'default';
                return;
            }
            
            if (isDraggingConnection && connectingFrom) {
                const pos = getMousePos(e);
                
                // 检查所有节点的连接点
                let targetNode = null;
                let targetDirection = null;
                
                for (const node of nodes) {
                    const direction = getDirectionFromPos(node, pos);
                    if (direction) {
                        targetNode = node;
                        targetDirection = direction;
                        break;
                    }
                }
                
                console.log('Mouse up at:', pos.x, pos.y, 'Node:', targetNode ? targetNode.id : null, 'Direction:', targetDirection);
                
                if (targetNode && targetDirection && targetNode !== connectingFrom) {
                    console.log('Creating connection:', connectingFrom.id, '->', targetNode.id, tempConnection.fromDirection, '->', targetDirection);
                    addConnection(connectingFrom, targetNode, tempConnection.fromDirection, targetDirection);
                    selectNode(targetNode);
                } else {
                    console.log('Connection cancelled');
                    selectNode(connectingFrom);
                }
                
                connectingFrom = null;
                tempConnection = null;
                isDraggingConnection = false;
                canvas.style.cursor = 'default';
            }
        }
        
        function handleContextMenu(e) {
            e.preventDefault();
            const pos = getMousePos(e);
            
            // 检查所有节点的连接点
            let targetNode = null;
            let targetDirection = null;
            
            for (const node of nodes) {
                const direction = getDirectionFromPos(node, pos);
                if (direction) {
                    targetNode = node;
                    targetDirection = direction;
                    break;
                }
            }
            
            if (targetNode && targetDirection) {
                if (!connectingFrom) {
                    connectingFrom = targetNode;
                    tempConnection = { from: targetNode, to: pos, fromDirection: targetDirection };
                    isDraggingConnection = true;
                    setTool('connect');
                    canvas.style.cursor = 'crosshair';
                } else if (targetNode !== connectingFrom) {
                    addConnection(connectingFrom, targetNode, tempConnection.fromDirection, targetDirection);
                    connectingFrom = null;
                    tempConnection = null;
                    isDraggingConnection = false;
                    canvas.style.cursor = 'default';
                }
            } else {
                connectingFrom = null;
                tempConnection = null;
                isDraggingConnection = false;
                canvas.style.cursor = 'default';
            }
            render();
        }
        
        function handleWheel(e) {
            e.preventDefault();
            const delta = e.deltaY > 0 ? 0.9 : 1.1;
            const newZoom = Math.max(0.2, Math.min(3, zoom * delta));
            
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            
            pan.x = mouseX - (mouseX - pan.x) * (newZoom / zoom);
            pan.y = mouseY - (mouseY - pan.y) * (newZoom / zoom);
            
            zoom = newZoom;
            updateStats();
            render();
        }
        
        function handleMouseHover(e) {
            const pos = getMousePos(e);
            let hovered = false;
            
            for (const node of nodes) {
                const direction = getDirectionFromPos(node, pos);
                if (direction) {
                    hoveredNode = node;
                    hoveredDirection = direction;
                    hovered = true;
                    canvas.style.cursor = 'pointer';
                    render();
                    return;
                }
            }
            
            if (!hovered) {
                hoveredNode = null;
                hoveredDirection = null;
                canvas.style.cursor = currentTool === 'pan' ? 'grab' : currentTool === 'connect' ? 'crosshair' : 'default';
                render();
            }
        }
        
        function addNode() {
            const id = 'room_' + (nodes.length + 1);
            const node = {
                id: id,
                name: '房间 ' + (nodes.length + 1),
                description: '',
                x: canvas.width / 2 / zoom - pan.x / zoom + (Math.random() - 0.5) * 200,
                y: canvas.height / 2 / zoom - pan.y / zoom + (Math.random() - 0.5) * 200,
                level: 1,
                environment: 'village',
                isSafe: true,
                colorIndex: nodes.length % nodeColors.length,
                exits: []
            };
            nodes.push(node);
            selectNode(node);
            updateNodeList();
            updateStats();
            render();
        }
        
        function selectNode(node) {
            selectedNode = node;
            const panel = document.getElementById('propertyPanel');
            
            if (node) {
                panel.style.display = 'block';
                document.getElementById('propId').value = node.id;
                document.getElementById('propName').value = node.name;
                document.getElementById('propDesc').value = node.description;
                document.getElementById('propLevel').value = node.level;
                document.getElementById('propEnv').value = node.environment;
                document.getElementById('propSafe').value = String(node.isSafe);
                
                const options = document.querySelectorAll('.color-option');
                options.forEach((opt, i) => {
                    opt.classList.toggle('selected', i === node.colorIndex);
                });
            } else {
                panel.style.display = 'none';
            }
            
            updateNodeList();
            render();
        }
        
        function updateNodeProperties() {
            if (!selectedNode) return;
            
            selectedNode.id = document.getElementById('propId').value;
            selectedNode.name = document.getElementById('propName').value;
            selectedNode.description = document.getElementById('propDesc').value;
            selectedNode.level = parseInt(document.getElementById('propLevel').value);
            selectedNode.environment = document.getElementById('propEnv').value;
            selectedNode.isSafe = document.getElementById('propSafe').value === 'true';
            
            updateNodeList();
            render();
        }
        
        function deleteSelectedNode() {
            if (!selectedNode) return;
            
            connections = connections.filter(conn => 
                conn.from !== selectedNode && conn.to !== selectedNode
            );
            
            nodes = nodes.filter(n => n !== selectedNode);
            selectNode(null);
            updateNodeList();
            updateStats();
            render();
        }
        
        function addConnection(from, to, fromDirection, toDirection) {
            // 验证方向
            if (!fromDirection || !toDirection) {
                alert('请点击方向连接器来创建连接');
                return;
            }
            
            const exists = connections.some(c => 
                (c.from === from && c.to === to) || (c.from === to && c.to === from)
            );
            
            if (!exists) {
                connections.push({ from, to, fromDirection, toDirection });
                
                if (!from.exits) from.exits = [];
                if (!to.exits) to.exits = [];
                
                from.exits.push({ direction: fromDirection, target_room: to.id, description: '' });
                to.exits.push({ direction: toDirection, target_room: from.id, description: '' });
                
                updateStats();
            }
        }
        
        function updateNodeList() {
            const list = document.getElementById('nodeList');
            list.innerHTML = '';
            
            nodes.forEach(node => {
                const item = document.createElement('div');
                item.className = 'node-list-item' + (node === selectedNode ? ' selected' : '');
                item.innerHTML = `
                    <div class="node-list-item-name">${envIcons[node.environment] || '📍'} ${node.name}</div>
                    <div class="node-list-item-id">${node.id}</div>
                `;
                item.onclick = () => {
                    selectNode(node);
                    panToNode(node);
                };
                list.appendChild(item);
            });
        }
        
        function panToNode(node) {
            pan.x = canvas.width / 2 - node.x * zoom;
            pan.y = canvas.height / 2 - node.y * zoom;
            render();
        }
        
        function zoomIn() {
            zoom = Math.min(3, zoom * 1.2);
            updateStats();
            render();
        }
        
        function zoomOut() {
            zoom = Math.max(0.2, zoom / 1.2);
            updateStats();
            render();
        }
        
        function resetZoom() {
            zoom = 1;
            pan = { x: 0, y: 0 };
            updateStats();
            render();
        }
        
        function updateStats() {
            document.getElementById('statNodes').textContent = nodes.length;
            document.getElementById('statConnections').textContent = connections.length;
            document.getElementById('statZoom').textContent = Math.round(zoom * 100) + '%';
        }
        
        function clearCanvas() {
            if (confirm('确定要清空所有节点吗？')) {
                nodes = [];
                connections = [];
                selectedNode = null;
                connectingFrom = null;
                tempConnection = null;
                document.getElementById('propertyPanel').style.display = 'none';
                updateNodeList();
                updateStats();
                render();
            }
        }
        
        function saveWorld() {
            const worldData = {
                nodes: nodes.map(n => ({
                    id: n.id,
                    name: n.name,
                    description: n.description,
                    x: n.x,
                    y: n.y,
                    level: n.level,
                    environment: n.environment,
                    isSafe: n.isSafe,
                    colorIndex: n.colorIndex,
                    exits: n.exits || []
                })),
                connections: connections.map(c => ({
                    from: c.from.id,
                    to: c.to.id,
                    fromDirection: c.fromDirection,
                    toDirection: c.toDirection
                }))
            };
            
            const json = JSON.stringify(worldData, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'world_map.json';
            a.click();
            URL.revokeObjectURL(url);
        }
        
        function loadWorld() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = JSON.parse(e.target.result);
                        nodes = data.nodes.map(n => ({
                            ...n,
                            exits: n.exits || []
                        }));
                        connections = data.connections.map(c => ({
                            from: nodes.find(n => n.id === c.from),
                            to: nodes.find(n => n.id === c.to),
                            fromDirection: c.fromDirection || 'east',
                            toDirection: c.toDirection || 'west'
                        })).filter(c => c.from && c.to);
                        
                        selectNode(null);
                        updateNodeList();
                        updateStats();
                        render();
                    } catch (err) {
                        alert('加载失败：' + err.message);
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }
        
        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.save();
            ctx.translate(pan.x, pan.y);
            ctx.scale(zoom, zoom);
            
            drawGrid();
            drawConnections();
            if (tempConnection) {
                drawTempConnection(tempConnection.from, tempConnection.to, tempConnection.fromDirection);
            }
            drawNodes();
            
            ctx.restore();
        }
        
        function drawGrid() {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            
            const gridSize = 50;
            const startX = Math.floor(-pan.x / zoom / gridSize) * gridSize - gridSize;
            const startY = Math.floor(-pan.y / zoom / gridSize) * gridSize - gridSize;
            const endX = startX + canvas.width / zoom + gridSize * 2;
            const endY = startY + canvas.height / zoom + gridSize * 2;
            
            for (let x = startX; x < endX; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, startY);
                ctx.lineTo(x, endY);
                ctx.stroke();
            }
            
            for (let y = startY; y < endY; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(startX, y);
                ctx.lineTo(endX, y);
                ctx.stroke();
            }
        }
        
        function drawConnections() {
            connections.forEach(conn => {
                drawConnection(conn);
            });
        }
        
        function drawConnection(conn) {
            const { from, to, fromDirection, toDirection } = conn;
            const size = 76;
            const halfSize = size / 2;
            
            // 计算连接起点和终点（从方向连接器开始）
            let startX = from.x;
            let startY = from.y;
            let endX = to.x;
            let endY = to.y;
            
            switch (fromDirection) {
                case 'north':
                    startY = from.y - halfSize;
                    break;
                case 'east':
                    startX = from.x + halfSize;
                    break;
                case 'south':
                    startY = from.y + halfSize;
                    break;
                case 'west':
                    startX = from.x - halfSize;
                    break;
            }
            
            switch (toDirection) {
                case 'north':
                    endY = to.y - halfSize;
                    break;
                case 'east':
                    endX = to.x + halfSize;
                    break;
                case 'south':
                    endY = to.y + halfSize;
                    break;
                case 'west':
                    endX = to.x - halfSize;
                    break;
            }
            
            // 绘制连接线 - 现代样式
            ctx.beginPath();
            ctx.moveTo(startX, startY);
            ctx.lineTo(endX, endY);
            
            // 创建渐变线条
            const lineGradient = ctx.createLinearGradient(startX, startY, endX, endY);
            lineGradient.addColorStop(0, 'rgba(255, 255, 255, 0.35)');
            lineGradient.addColorStop(0.5, 'rgba(255, 255, 255, 0.15)');
            lineGradient.addColorStop(1, 'rgba(255, 255, 255, 0.35)');
            
            ctx.strokeStyle = lineGradient;
            ctx.lineWidth = 2;
            ctx.stroke();
        }
        
        function drawTempConnection(from, to, fromDirection) {
            const size = 76;
            const halfSize = size / 2;
            
            // 计算连接起点（从方向连接器开始）
            let startX = from.x;
            let startY = from.y;
            
            switch (fromDirection) {
                case 'north':
                    startY = from.y - halfSize;
                    break;
                case 'east':
                    startX = from.x + halfSize;
                    break;
                case 'south':
                    startY = from.y + halfSize;
                    break;
                case 'west':
                    startX = from.x - halfSize;
                    break;
            }
            
            // 绘制临时连接线 - 现代样式
            ctx.beginPath();
            ctx.moveTo(startX, startY);
            ctx.lineTo(to.x, to.y);
            
            // 创建渐变线条
            const lineGradient = ctx.createLinearGradient(startX, startY, to.x, to.y);
            lineGradient.addColorStop(0, '#38bdf8');
            lineGradient.addColorStop(1, '#0ea5e9');
            
            ctx.strokeStyle = lineGradient;
            ctx.lineWidth = 2.5;
            ctx.setLineDash([10, 5]);
            ctx.stroke();
            ctx.setLineDash([]);
        }
        
        function drawNodes() {
            nodes.forEach(node => {
                const isSelected = node === selectedNode;
                const isConnecting = node === connectingFrom;
                const color = nodeColors[node.colorIndex];
                const size = 76;
                const halfSize = size / 2;
                const cornerRadius = 14;
                
                // 绘制背景光晕 - 增强深度和层次感
                if (isSelected) {
                    const glowGradient = ctx.createRadialGradient(
                        node.x, node.y, 0,
                        node.x, node.y, size * 0.7
                    );
                    glowGradient.addColorStop(0, 'rgba(56, 189, 248, 0.3)');
                    glowGradient.addColorStop(0.5, 'rgba(56, 189, 248, 0.15)');
                    glowGradient.addColorStop(1, 'rgba(56, 189, 248, 0)');
                    
                    ctx.fillStyle = glowGradient;
                    ctx.beginPath();
                    ctx.arc(node.x, node.y, size * 0.7, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // 绘制主体 - 现代渐变效果
                const gradient = ctx.createLinearGradient(
                    node.x - halfSize, node.y - halfSize,
                    node.x + halfSize, node.y + halfSize
                );
                gradient.addColorStop(0, color);
                gradient.addColorStop(0.5, shadeColor(color, -10));
                gradient.addColorStop(1, shadeColor(color, -35));
                
                // 绘制阴影 - 增强立体感
                ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
                roundRect(ctx, node.x - halfSize + 3, node.y - halfSize + 3, size, size, cornerRadius);
                ctx.fill();
                
                // 绘制主体
                ctx.fillStyle = gradient;
                roundRect(ctx, node.x - halfSize, node.y - halfSize, size, size, cornerRadius);
                ctx.fill();
                
                // 绘制边框 - 现代样式
                if (isSelected) {
                    ctx.strokeStyle = '#38bdf8';
                    ctx.lineWidth = 2.5;
                } else if (isConnecting) {
                    ctx.strokeStyle = 'rgba(255, 255, 0, 0.8)';
                    ctx.lineWidth = 2.5;
                } else {
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
                    ctx.lineWidth = 1;
                }
                roundRect(ctx, node.x - halfSize, node.y - halfSize, size, size, cornerRadius);
                ctx.stroke();
                
                // 绘制高光 - 增强质感
                const highlightGradient = ctx.createLinearGradient(
                    node.x - halfSize, node.y - halfSize,
                    node.x + halfSize, node.y - halfSize
                );
                highlightGradient.addColorStop(0, 'rgba(255, 255, 255, 0.2)');
                highlightGradient.addColorStop(0.5, 'rgba(255, 255, 255, 0.1)');
                highlightGradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
                
                ctx.strokeStyle = highlightGradient;
                ctx.lineWidth = 1.5;
                roundRect(ctx, node.x - halfSize + 1, node.y - halfSize + 1, size - 2, size / 3, cornerRadius - 2);
                ctx.stroke();
                
                // 绘制连接点 - 现代精致设计
                const connectorRadius = 12;
                const connectorHoverRadius = 16;
                
                drawConnector(node.x, node.y - halfSize, 'north', node, isSelected, isConnecting, connectorRadius, connectorHoverRadius);
                drawConnector(node.x + halfSize, node.y, 'east', node, isSelected, isConnecting, connectorRadius, connectorHoverRadius);
                drawConnector(node.x, node.y + halfSize, 'south', node, isSelected, isConnecting, connectorRadius, connectorHoverRadius);
                drawConnector(node.x - halfSize, node.y, 'west', node, isSelected, isConnecting, connectorRadius, connectorHoverRadius);
                
                // 绘制房间信息 - 现代排版
                ctx.font = '26px system-ui, -apple-system, sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = 'rgba(255, 255, 255, 0.98)';
                const icon = envIcons[node.environment] || '📍';
                ctx.fillText(icon, node.x, node.y - 4);
                
                ctx.font = '500 11px system-ui, -apple-system, sans-serif';
                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                const name = node.name.length > 8 ? node.name.substring(0, 8) + '…' : node.name;
                ctx.fillText(name, node.x, node.y + 20);
                
                if (node.isSafe) {
                    ctx.font = '11px system-ui, -apple-system, sans-serif';
                    ctx.fillText('🛡️', node.x + 28, node.y - 24);
                }
                
                if (node.level > 1) {
                    ctx.font = '600 10px system-ui, -apple-system, sans-serif';
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
                    ctx.fillText('Lv' + node.level, node.x - 28, node.y - 24);
                }
            });
        }
        
        function drawConnector(x, y, direction, node, isSelected, isConnecting, radius, hoverRadius) {
            const isHovered = hoveredNode === node && hoveredDirection === direction;
            const currentRadius = isHovered ? hoverRadius : radius;
            
            // 绘制外圈 - 现代精致样式
            ctx.beginPath();
            ctx.arc(x, y, currentRadius, 0, Math.PI * 2);
            
            if (isHovered) {
                const connectorGradient = ctx.createRadialGradient(
                    x, y, 0,
                    x, y, currentRadius
                );
                connectorGradient.addColorStop(0, '#38bdf8');
                connectorGradient.addColorStop(1, '#0ea5e9');
                ctx.fillStyle = connectorGradient;
            } else if (isSelected) {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
            } else {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            }
            ctx.fill();
            
            // 绘制内圈 - 现代样式
            ctx.beginPath();
            ctx.arc(x, y, currentRadius * 0.6, 0, Math.PI * 2);
            
            if (isHovered) {
                ctx.fillStyle = 'rgba(15, 17, 21, 0.95)';
            } else {
                ctx.fillStyle = 'rgba(15, 17, 21, 0.6)';
            }
            ctx.fill();
            
            // 绘制方向符号 - 现代样式
            ctx.font = isHovered ? '600 11px system-ui, -apple-system, sans-serif' : '500 9px system-ui, -apple-system, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = isHovered ? '#fff' : 'rgba(255, 255, 255, 0.95)';
            
            const symbols = {
                north: '↑',
                east: '→',
                south: '↓',
                west: '←'
            };
            ctx.fillText(symbols[direction], x, y);
        }
        
        function roundRect(ctx, x, y, width, height, radius) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
        }
        
        function shadeColor(color, percent) {
            const num = parseInt(color.replace('#', ''), 16);
            const amt = Math.round(2.55 * percent);
            const R = (num >> 16) + amt;
            const G = (num >> 8 & 0x00FF) + amt;
            const B = (num & 0x0000FF) + amt;
            return '#' + (0x1000000 +
                (R < 255 ? R < 1 ? 0 : R : 255) * 0x10000 +
                (G < 255 ? G < 1 ? 0 : G : 255) * 0x100 +
                (B < 255 ? B < 1 ? 0 : B : 255)
            ).toString(16).slice(1);
        }
        
        function createDemoWorld() {
            const positions = [
                { x: 400, y: 300 },
                { x: 600, y: 200 },
                { x: 600, y: 400 },
                { x: 800, y: 300 },
                { x: 200, y: 300 },
                { x: 400, y: 500 },
                { x: 400, y: 100 }
            ];
            
            const rooms = [
                { id: 'village_square', name: '村庄广场', env: 'village', safe: true, level: 1 },
                { id: 'east_forest', name: '东边森林', env: 'forest', safe: false, level: 2 },
                { id: 'south_mountain', name: '南山', env: 'mountain', safe: false, level: 3 },
                { id: 'old_temple', name: '古老寺庙', env: 'temple', safe: true, level: 5 },
                { id: 'west_river', name: '西河', env: 'plains', safe: true, level: 1 },
                { id: 'cave_entrance', name: '洞穴入口', env: 'cave', safe: false, level: 4 },
                { id: 'shrine', name: '山顶祠堂', env: 'temple', safe: true, level: 3 }
            ];
            
            rooms.forEach((room, i) => {
                nodes.push({
                    id: room.id,
                    name: room.name,
                    description: '',
                    x: positions[i].x,
                    y: positions[i].y,
                    level: room.level,
                    environment: room.env,
                    isSafe: room.safe,
                    colorIndex: i,
                    exits: []
                });
            });
            
            const pairs = [
                [0, 1], [0, 2], [0, 4], [0, 6],
                [1, 3], [2, 5], [2, 6], [5, 3]
            ];
            
            pairs.forEach(([a, b]) => {
                addConnection(nodes[a], nodes[b]);
            });
            
            updateNodeList();
            updateStats();
            render();
        }
        
        init();
    </script>
</body>
